name: Asset system CI

on:
  pull_request:
  push:
    branches:
      - codex/hamsa-asset-system

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          cat build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report build failure
        if: steps.build.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- asset-system-build-log -->'
            echo '### Asset-system build failure'
            echo '```text'
            tail -n 140 build.log
            echo '```'
          } > pr-comment.md
          gh pr comment 36 --edit-last --create-if-none --body-file pr-comment.md
          exit 1
      - name: Pages build
        id: pages
        shell: bash
        run: |
          set +e
          npm run pages:build > pages-build.log 2>&1
          code=$?
          cat pages-build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report Pages failure
        if: steps.pages.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- asset-system-pages-log -->'
            echo '### Asset-system GitHub Pages build failure'
            echo '```text'
            tail -n 140 pages-build.log
            echo '```'
          } > pr-comment.md
          gh pr comment 36 --edit-last --create-if-none --body-file pr-comment.md
          exit 1
