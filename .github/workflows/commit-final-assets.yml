name: Commit final generated assets

on:
  push:
    branches:
      - codex/hamsa-asset-system

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/hamsa-asset-system
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run assets:generate
      - name: Commit generated assets
        run: |
          if git diff --quiet; then
            echo "Generated assets already match source"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/game
          git commit -m "Materialize standalone icons and final asset manifest"
          git push
